services:
  - type: web
    name: ai-chat-playground-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-V4-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
